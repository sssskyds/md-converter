  <style>
    :root,[data-theme="light"]{
      --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;
      --surface-offset:#f0eee9;--surface-dynamic:#e6e4df;
      --border:#d4d1ca;--divider:#dcd9d5;
      --text:#28251d;--text-muted:#7a7974;--text-faint:#bab9b4;
      --primary:#01696f;--primary-hover:#0c4e54;--primary-hl:#cedcd8;
      --success:#437a22;--error:#a13544;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
      --shadow-sm:0 1px 2px oklch(0.2 0.01 80/.06);
      --shadow-md:0 4px 12px oklch(0.2 0.01 80/.08);
      --shadow-lg:0 12px 32px oklch(0.2 0.01 80/.12);
      --font-body:"Inter",system-ui,sans-serif;
      --font-mono:"JetBrains Mono","Fira Code",monospace;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
      --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;
      --space-10:2.5rem;--space-12:3rem;
      --tr:180ms cubic-bezier(.16,1,.3,1);
    }
    [data-theme="dark"]{
      --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;
      --surface-offset:#222120;--surface-dynamic:#2d2c2a;
      --border:#393836;--divider:#262523;
      --text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;
      --primary:#4f98a3;--primary-hover:#227f8b;--primary-hl:#1e3133;
      --success:#6daa45;--error:#dd6974;
      --shadow-sm:0 1px 2px oklch(0 0 0/.2);
      --shadow-md:0 4px 12px oklch(0 0 0/.3);
      --shadow-lg:0 12px 32px oklch(0 0 0/.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
      color:var(--text);background:var(--bg);line-height:1.6;
      transition:background var(--tr),color var(--tr)}
    img,svg{display:block;max-width:100%}
    input,button,select,textarea{font:inherit;color:inherit}
    button{cursor:pointer;background:none;border:none}
    :focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--radius-sm)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

    .skip-link{position:absolute;left:-9999px;top:var(--space-2);background:var(--primary);
      color:#fff;padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);
      font-size:var(--text-sm);z-index:9999}
    .skip-link:focus{left:var(--space-4)}

    header{background:var(--surface);border-bottom:1px solid var(--border);
      padding:var(--space-3) var(--space-6);display:flex;align-items:center;
      gap:var(--space-3);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
    .logo-mark{width:32px;height:32px;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;color:var(--primary)}
    .site-title{font-size:var(--text-base);font-weight:600;color:var(--text);letter-spacing:-.01em}
    .site-title span{color:var(--primary)}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:var(--space-3)}
    .badge{background:color-mix(in oklch,var(--primary) 12%,var(--surface));color:var(--primary);
      border:1px solid color-mix(in oklch,var(--primary) 25%,var(--border));
      padding:.2rem var(--space-3);border-radius:9999px;font-size:var(--text-xs);font-weight:600}
    .theme-toggle{width:34px;height:34px;border-radius:var(--radius-md);display:flex;
      align-items:center;justify-content:center;color:var(--text-muted);
      transition:color var(--tr),background var(--tr)}
    .theme-toggle:hover{color:var(--text);background:var(--surface-dynamic)}

    .hero{padding:clamp(var(--space-8),6vw,var(--space-12)) var(--space-6) var(--space-6);
      text-align:center;max-width:640px;margin-inline:auto}
    .hero h1{font-size:var(--text-xl);font-weight:700;letter-spacing:-.025em;
      line-height:1.15;color:var(--text);margin-bottom:var(--space-3)}
    .hero p{font-size:var(--text-sm);color:var(--text-muted);max-width:52ch;
      margin-inline:auto;margin-bottom:var(--space-5)}
    .pills{display:flex;justify-content:center;flex-wrap:wrap;gap:var(--space-2)}
    .pill{background:var(--surface-offset);border:1px solid var(--border);border-radius:9999px;
      padding:.25rem var(--space-3);font-size:var(--text-xs);color:var(--text-muted);
      display:flex;align-items:center;gap:var(--space-1)}
    .pill-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0}

    .main{max-width:1160px;margin-inline:auto;padding:0 var(--space-5) var(--space-12)}

    .tab-bar{display:flex;gap:2px;background:var(--surface-offset);border:1px solid var(--border);
      border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:var(--space-1);overflow:hidden}
    .tab-btn{flex:1;padding:var(--space-2) var(--space-4);
      border-radius:calc(var(--radius-xl) - var(--space-1));
      font-size:var(--text-sm);font-weight:500;color:var(--text-muted);
      transition:color var(--tr),background var(--tr),box-shadow var(--tr)}
    .tab-btn:hover{color:var(--text);background:color-mix(in oklch,var(--text) 6%,transparent)}
    .tab-btn.active{color:var(--text);background:var(--surface);box-shadow:var(--shadow-sm)}

    .panel{display:none;background:var(--surface);border:1px solid var(--border);
      border-top:none;border-radius:0 0 var(--radius-xl) var(--radius-xl);padding:var(--space-6)}
    .panel.active{display:block}

    .drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius-lg);
      padding:var(--space-10) var(--space-6);text-align:center;cursor:pointer;
      transition:border-color var(--tr),background var(--tr);
      background:var(--surface-2);margin-bottom:var(--space-5)}
    .drop-zone:hover,.drop-zone.drag-over{border-color:var(--primary);background:var(--primary-hl)}
    .drop-icon{width:48px;height:48px;margin:0 auto var(--space-3);color:var(--text-faint)}
    .drop-zone h3{font-size:var(--text-sm);font-weight:600;color:var(--text);margin-bottom:var(--space-1)}
    .drop-zone p{font-size:var(--text-xs);color:var(--text-muted)}
    .drop-zone strong{color:var(--primary)}
    #file-input{display:none}

    .file-loaded{display:none;align-items:center;gap:var(--space-2);
      background:color-mix(in oklch,var(--success) 10%,var(--surface));
      border:1px solid color-mix(in oklch,var(--success) 25%,var(--border));
      border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);
      font-size:var(--text-xs);color:var(--success);margin-bottom:var(--space-4)}
    .file-loaded.show{display:flex}

    .stats-bar{display:flex;gap:var(--space-4);margin-bottom:var(--space-4);flex-wrap:wrap}
    .stat{font-size:var(--text-xs);color:var(--text-muted)}
    .stat strong{color:var(--text);font-weight:600}
